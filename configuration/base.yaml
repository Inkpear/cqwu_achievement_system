# Database defaults shared by all environments.
database:
  # Postgres port.
  port: 5432
  # Database login username.
  username: "postgres"
  # Database login password.
  password: "password"
  # Application database name.
  database_name: "cqwu_achievement_database"
  # Minimum number of connections in the pool.
  min_connections: 5
  # Maximum number of connections in the pool.
  max_connections: 20

# HTTP server defaults.
application:
  # Listening port for the HTTP server.
  port: 8000

# Logging defaults.
log:
  # Directory where log files are written.
  log_path: "logs"
  # Prefix used when generating log file names.
  log_prefix: "achievement-api"

# JWT authentication defaults.
jwt:
  # Secret key used to sign and verify JWT tokens.
  secret: "your-secret-key-change-this-in-production"

# Object storage defaults.
storage:
  # S3 region.
  region: "cn-north-1"
  # Default S3 bucket name.
  bucket_name: "achievement-bucket"

# Background task system defaults.
tasks:
  # Interval for periodic orphan object cleanup.
  orphan_cleanup_interval_seconds: 3600
  # Only clean objects older than this age to avoid racing in-flight writes.
  orphan_cleanup_min_age_seconds: 3600
  # In-memory queue capacity for task commands.
  command_queue_size: 1024
  # Maximum number of concurrent command executions.
  command_worker_concurrency: 32
  # Enable/disable command worker and outbox pulling.
  command_worker_enabled: true
  # Polling interval for pulling pending commands from outbox.
  outbox_pull_interval_millis: 500
  # Maximum outbox rows pulled per poll cycle.
  outbox_pull_batch_size: 100
  # Running-task timeout; stale running rows are reclaimed after this period.
  outbox_running_timeout_seconds: 300
