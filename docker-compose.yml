services:
  postgres:
    image: postgres:16-alpine
    environment:
      TZ: ${TZ:-CST-8}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cqwu_achievement_database}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      TZ: ${TZ:-CST-8}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-admin123}",
      ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-CST-8}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-cqwu-achievement/backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-CST-8}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      APP_APPLICATION__HOST: 0.0.0.0
      APP_APPLICATION__PORT: ${BACKEND_CONTAINER_PORT:-8000}
      APP_APPLICATION__BASE_URL: ${APP_APPLICATION_BASE_URL:-http://localhost:8000}
      APP_DATABASE__HOST: postgres
      APP_DATABASE__PORT: 5432
      APP_DATABASE__USERNAME: ${POSTGRES_USER:-postgres}
      APP_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-password}
      APP_DATABASE__DATABASE_NAME: ${POSTGRES_DB:-cqwu_achievement_database}
      APP_DATABASE__REQUIRE_SSL: "false"
      APP_REDIS__URI: redis://:${REDIS_PASSWORD:-admin123}@redis:6379/1
      APP_STORAGE__ENDPOINT: ${APP_STORAGE_ENDPOINT:-http://127.0.0.1:9000}
      APP_STORAGE__REGION: ${S3_REGION:-cn-north-1}
      APP_STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER:-root}
      APP_STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      APP_STORAGE__BUCKET_NAME: ${S3_BUCKET_NAME:-achievement-bucket}
      APP_STORAGE__SIG_EXP_SECONDS: ${S3_SIG_EXP_SECONDS:-1800}
      APP_STORAGE__VIEW_EXP_SECONDS: ${S3_VIEW_EXP_SECONDS:-86400}
      APP_JWT__SECRET: ${APP_JWT_SECRET:-your-secret-key-change-this-in-production}
      APP_JWT__EXPIRATION: ${APP_JWT_EXPIRATION:-86400}
      APP_LOG__LOG_PATH: ${APP_LOG_PATH:-/tmp/logs}
      APP_LOG__LOG_PREFIX: ${APP_LOG_PREFIX:-achievement-api}
      APP_LOG__LOG_LEVEL: ${APP_LOG_LEVEL:-info}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_CONTAINER_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-cqwu-achievement/frontend:latest}
    build:
      context: ./cqwu_achievement_system_vue
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ:-CST-8}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
